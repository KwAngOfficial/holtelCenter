# Render Blueprint — Sao Dem Holtel (free tier)
# https://render.com/docs/blueprint-spec

services:
  # Backend .NET API (Docker)
  - type: web
    name: saodem-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/HoltelCentrel.Api/Dockerfile
    dockerContext: ./backend/HoltelCentrel.Api
    healthCheckPath: /api/rooms/availability
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Admin__Password
        sync: false
      - key: Admin__TokenSecret
        generateValue: true
      - key: Admin__SessionDays
        value: "30"
      - key: FRONTEND_URL
        sync: false
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=holtelcentrel.db

  # Frontend React (Static Site) — bỏ qua nếu dùng Vercel
  - type: web
    name: saodem-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
